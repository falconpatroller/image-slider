<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineering Drawing Slider</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="slider-app" aria-label="Engineering drawing image slider">
    <div class="slider-frame">
      <div class="slides" id="slides">
        <section class="slide active" data-index="0">
          <img src="images/Ex01.png" alt="Engineering drawing 1">
        </section>
        <section class="slide" data-index="1">
          <img src="images/Ex02.png" alt="Engineering drawing 2">
        </section>
        <section class="slide" data-index="2">
          <img src="images/Ex03.png" alt="Engineering drawing 3">
        </section>
        <section class="slide" data-index="3">
          <img src="images/Ex04.png" alt="Engineering drawing 4">
        </section>
        <section class="slide" data-index="4">
          <img src="images/Ex05.png" alt="Engineering drawing 5">
        </section>
      </div>

      <button class="nav prev" id="prevBtn" aria-label="Previous image">&#10094;</button>
      <button class="nav next" id="nextBtn" aria-label="Next image">&#10095;</button>
    </div>

    <div class="toolbar">
      <div class="caption" id="caption">Image 1 of 5</div>
      <div class="controls">
        <button class="secondary" id="playPauseBtn" aria-pressed="false">Auto Play</button>
      </div>
    </div>

    <div class="dots" id="dots" aria-label="Choose image"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
